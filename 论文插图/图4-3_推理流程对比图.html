<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>图4-3 推理流程对比图（U-Net vs YOLO11-seg）</title>
<style>
  body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #fff; font-family: "SimSun", "SimHei", serif; }
</style>
</head>
<body>
<svg width="900" height="620" viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5 Z" fill="#555"/></marker>
    <marker id="ag" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5 Z" fill="#27AE60"/></marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#333" font-family="SimSun, SimHei">图4-3 推理流程对比图 (U-Net vs YOLO11-seg)</text>

  <!-- ===== Common input ===== -->
  <rect x="370" y="50" width="160" height="40" rx="6" fill="#34495E"/>
  <text x="450" y="75" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold" font-family="SimHei">DCM 文件输入</text>

  <!-- Split arrows -->
  <line x1="410" y1="90" x2="200" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="490" y1="90" x2="700" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ========== LEFT: U-Net Pipeline ========== -->
  <rect x="40" y="108" width="340" height="390" rx="8" fill="#FDF2E9" stroke="#E67E22" stroke-width="2"/>
  <text x="210" y="136" text-anchor="middle" font-size="14" font-weight="bold" fill="#E67E22" font-family="SimHei">原方案: U-Net</text>

  <!-- Step 1 -->
  <rect x="70" y="150" width="280" height="36" rx="4" fill="#E67E22" opacity="0.85"/>
  <text x="210" y="172" text-anchor="middle" font-size="11" fill="#fff">SimpleITK 读取 -> float32 归一化</text>
  <line x1="210" y1="186" x2="210" y2="198" stroke="#555" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- Step 2 -->
  <rect x="70" y="200" width="280" height="36" rx="4" fill="#E67E22" opacity="0.85"/>
  <text x="210" y="222" text-anchor="middle" font-size="11" fill="#fff">torch Tensor 转换 [1, 1, H, W]</text>
  <line x1="210" y1="236" x2="210" y2="248" stroke="#555" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- Step 3 -->
  <rect x="70" y="250" width="280" height="42" rx="4" fill="#C0392B"/>
  <text x="210" y="268" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">U-Net 前向推理</text>
  <text x="210" y="284" text-anchor="middle" font-size="9" fill="#fdd">model(x) -> Sigmoid概率图 [1,1,H,W]</text>
  <line x1="210" y1="292" x2="210" y2="304" stroke="#555" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- Step 4 -->
  <rect x="70" y="306" width="280" height="36" rx="4" fill="#E67E22" opacity="0.85"/>
  <text x="210" y="328" text-anchor="middle" font-size="11" fill="#fff">手动阈值二值化 (threshold=0.56)</text>
  <line x1="210" y1="342" x2="210" y2="354" stroke="#555" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- Step 5 -->
  <rect x="70" y="356" width="280" height="36" rx="4" fill="#E67E22" opacity="0.85"/>
  <text x="210" y="378" text-anchor="middle" font-size="11" fill="#fff">保存二值 mask PNG</text>

  <!-- U-Net characteristics -->
  <rect x="70" y="405" width="280" height="75" rx="4" fill="#FDEBD0" stroke="#F5CBA7" stroke-width="1"/>
  <text x="210" y="422" text-anchor="middle" font-size="10" fill="#E67E22" font-weight="bold">U-Net 特点:</text>
  <text x="210" y="438" text-anchor="middle" font-size="9" fill="#666">- 输入: 单通道灰度 Tensor</text>
  <text x="210" y="452" text-anchor="middle" font-size="9" fill="#666">- 需手动 Tensor 转换和维度处理</text>
  <text x="210" y="466" text-anchor="middle" font-size="9" fill="#666">- 需手动阈值化和后处理</text>

  <!-- ========== RIGHT: YOLO11-seg Pipeline ========== -->
  <rect x="520" y="108" width="340" height="390" rx="8" fill="#EBF5FB" stroke="#4A90D9" stroke-width="2"/>
  <text x="690" y="136" text-anchor="middle" font-size="14" font-weight="bold" fill="#4A90D9" font-family="SimHei">改造方案: YOLO11-seg</text>

  <!-- Step 1 -->
  <rect x="550" y="150" width="280" height="36" rx="4" fill="#4A90D9" opacity="0.85"/>
  <text x="690" y="172" text-anchor="middle" font-size="11" fill="#fff">SimpleITK 读取 -> uint8 归一化</text>
  <line x1="690" y1="186" x2="690" y2="198" stroke="#555" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- Step 2 -->
  <rect x="550" y="200" width="280" height="36" rx="4" fill="#4A90D9" opacity="0.85"/>
  <text x="690" y="222" text-anchor="middle" font-size="11" fill="#fff">灰度转 BGR 3通道 PNG</text>
  <line x1="690" y1="236" x2="690" y2="248" stroke="#555" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- Step 3 -->
  <rect x="550" y="250" width="280" height="42" rx="4" fill="#2471A3"/>
  <text x="690" y="268" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">YOLO11-seg predict()</text>
  <text x="690" y="284" text-anchor="middle" font-size="9" fill="#d6eaf8">-> BBox + 置信度 + 实例Mask</text>
  <line x1="690" y1="292" x2="690" y2="304" stroke="#555" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- Step 4 -->
  <rect x="550" y="306" width="280" height="36" rx="4" fill="#4A90D9" opacity="0.85"/>
  <text x="690" y="328" text-anchor="middle" font-size="11" fill="#fff">多实例 mask 合并 (取并集)</text>
  <line x1="690" y1="342" x2="690" y2="354" stroke="#555" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- Step 5 -->
  <rect x="550" y="356" width="280" height="36" rx="4" fill="#4A90D9" opacity="0.85"/>
  <text x="690" y="378" text-anchor="middle" font-size="11" fill="#fff">保存二值 mask PNG</text>

  <!-- YOLO characteristics -->
  <rect x="550" y="405" width="280" height="75" rx="4" fill="#D6EAF8" stroke="#85C1E9" stroke-width="1"/>
  <text x="690" y="422" text-anchor="middle" font-size="10" fill="#2471A3" font-weight="bold">YOLO11-seg 特点:</text>
  <text x="690" y="438" text-anchor="middle" font-size="9" fill="#666">- 输入: 3通道 BGR 图像</text>
  <text x="690" y="452" text-anchor="middle" font-size="9" fill="#666">- 框架自动处理前/后处理</text>
  <text x="690" y="466" text-anchor="middle" font-size="9" fill="#666">- 额外输出置信度和边界框</text>

  <!-- ========== Common downstream ========== -->
  <!-- Merge arrows -->
  <line x1="210" y1="498" x2="210" y2="520" stroke="#555" stroke-width="1.5"/>
  <line x1="690" y1="498" x2="690" y2="520" stroke="#555" stroke-width="1.5"/>
  <line x1="210" y1="520" x2="690" y2="520" stroke="#555" stroke-width="1.5"/>
  <line x1="450" y1="520" x2="450" y2="538" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Output label -->
  <rect x="330" y="510" width="240" height="20" rx="4" fill="#27AE60" opacity="0.15"/>
  <text x="450" y="525" text-anchor="middle" font-size="11" fill="#27AE60" font-weight="bold">输出格式相同: 二值 mask PNG</text>

  <!-- Common downstream modules -->
  <rect x="230" y="542" width="140" height="36" rx="4" fill="#27AE60"/>
  <text x="300" y="565" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">标注可视化</text>

  <line x1="370" y1="560" x2="395" y2="560" stroke="#27AE60" stroke-width="1.5" marker-end="url(#ag)"/>

  <rect x="400" y="542" width="140" height="36" rx="4" fill="#27AE60"/>
  <text x="470" y="565" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">24项特征提取</text>

  <line x1="540" y1="560" x2="565" y2="560" stroke="#27AE60" stroke-width="1.5" marker-end="url(#ag)"/>

  <rect x="570" y="542" width="140" height="36" rx="4" fill="#27AE60"/>
  <text x="640" y="565" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">前端展示</text>

  <!-- Key point label -->
  <rect x="230" y="590" width="480" height="24" rx="4" fill="#D5F5E3" stroke="#82E0AA" stroke-width="1"/>
  <text x="470" y="607" text-anchor="middle" font-size="11" fill="#1E8449" font-weight="bold" font-family="SimHei">下游模块完全不变 -- 即插即用替换分割核心</text>
</svg>
</body>
</html>
