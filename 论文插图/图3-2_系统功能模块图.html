<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>图3-2 系统功能模块图</title>
<style>
  body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #fff; font-family: "SimSun", "SimHei", serif; }
</style>
</head>
<body>
<svg width="860" height="460" viewBox="0 0 860 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5 Z" fill="#555"/></marker>
  </defs>

  <text x="430" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#333" font-family="SimSun, SimHei">图3-2 系统功能模块图</text>

  <!-- ===== Root ===== -->
  <rect x="260" y="50" width="340" height="46" rx="6" fill="#2C3E50"/>
  <text x="430" y="74" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold" font-family="SimHei">直肠肿瘤 CT 辅助诊断系统</text>
  <text x="430" y="90" text-anchor="middle" font-size="10" fill="#ccc">CTAI System</text>

  <!-- Lines from root to 5 modules -->
  <line x1="130" y1="96" x2="130" y2="140" stroke="#555" stroke-width="1.5"/>
  <line x1="300" y1="96" x2="300" y2="140" stroke="#555" stroke-width="1.5"/>
  <line x1="430" y1="96" x2="430" y2="140" stroke="#555" stroke-width="1.5"/>
  <line x1="570" y1="96" x2="570" y2="140" stroke="#555" stroke-width="1.5"/>
  <line x1="720" y1="96" x2="720" y2="140" stroke="#555" stroke-width="1.5"/>
  <!-- Horizontal connector -->
  <line x1="130" y1="96" x2="720" y2="96" stroke="#555" stroke-width="1.5"/>

  <!-- ===== Module 1: CT Upload & Segmentation ===== -->
  <rect x="55" y="142" width="150" height="42" rx="5" fill="#E74C3C" opacity="0.9"/>
  <text x="130" y="162" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold" font-family="SimHei">CT图像分割</text>
  <text x="130" y="178" text-anchor="middle" font-size="9" fill="#fdd">核心功能模块</text>

  <!-- Sub-modules -->
  <line x1="130" y1="184" x2="130" y2="205" stroke="#E74C3C" stroke-width="1.2"/>

  <rect x="30" y="208" width="100" height="30" rx="3" fill="#F5B7B1"/>
  <text x="80" y="227" text-anchor="middle" font-size="9" fill="#333">DCM文件上传</text>

  <rect x="140" y="208" width="100" height="30" rx="3" fill="#F5B7B1"/>
  <text x="190" y="227" text-anchor="middle" font-size="9" fill="#333">YOLO11-seg推理</text>

  <rect x="30" y="245" width="100" height="30" rx="3" fill="#F5B7B1"/>
  <text x="80" y="264" text-anchor="middle" font-size="9" fill="#333">分割结果可视化</text>

  <rect x="140" y="245" width="100" height="30" rx="3" fill="#F5B7B1"/>
  <text x="190" y="264" text-anchor="middle" font-size="9" fill="#333">掩膜叠加标注</text>

  <line x1="130" y1="205" x2="80" y2="208" stroke="#E74C3C" stroke-width="1"/>
  <line x1="130" y1="205" x2="190" y2="208" stroke="#E74C3C" stroke-width="1"/>
  <line x1="80" y1="238" x2="80" y2="245" stroke="#E74C3C" stroke-width="1"/>
  <line x1="190" y1="238" x2="190" y2="245" stroke="#E74C3C" stroke-width="1"/>

  <!-- ===== Module 2: Feature Extraction ===== -->
  <rect x="225" y="142" width="150" height="42" rx="5" fill="#E67E22" opacity="0.9"/>
  <text x="300" y="162" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold" font-family="SimHei">特征提取</text>
  <text x="300" y="178" text-anchor="middle" font-size="9" fill="#fde">影像组学分析</text>

  <line x1="300" y1="184" x2="300" y2="205" stroke="#E67E22" stroke-width="1.2"/>

  <rect x="225" y="208" width="70" height="30" rx="3" fill="#F5CBA7"/>
  <text x="260" y="222" text-anchor="middle" font-size="9" fill="#333">形态学</text>
  <text x="260" y="233" text-anchor="middle" font-size="8" fill="#777">面积/周长</text>

  <rect x="300" y="208" width="70" height="30" rx="3" fill="#F5CBA7"/>
  <text x="335" y="222" text-anchor="middle" font-size="9" fill="#333">灰度统计</text>
  <text x="335" y="233" text-anchor="middle" font-size="8" fill="#777">均值/方差</text>

  <rect x="255" y="245" width="90" height="30" rx="3" fill="#F5CBA7"/>
  <text x="300" y="259" text-anchor="middle" font-size="9" fill="#333">GLGCM纹理</text>
  <text x="300" y="270" text-anchor="middle" font-size="8" fill="#777">15项纹理特征</text>

  <line x1="300" y1="205" x2="260" y2="208" stroke="#E67E22" stroke-width="1"/>
  <line x1="300" y1="205" x2="335" y2="208" stroke="#E67E22" stroke-width="1"/>
  <line x1="300" y1="238" x2="300" y2="245" stroke="#E67E22" stroke-width="1"/>

  <!-- ===== Module 3: Patient Management ===== -->
  <rect x="395" y="142" width="150" height="42" rx="5" fill="#27AE60" opacity="0.9"/>
  <text x="470" y="162" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold" font-family="SimHei">患者管理</text>
  <text x="470" y="178" text-anchor="middle" font-size="9" fill="#d5f5e3">信息CRUD</text>

  <line x1="470" y1="184" x2="470" y2="205" stroke="#27AE60" stroke-width="1.2"/>

  <rect x="400" y="208" width="65" height="30" rx="3" fill="#A9DFBF"/>
  <text x="432" y="227" text-anchor="middle" font-size="9" fill="#333">新增患者</text>

  <rect x="475" y="208" width="65" height="30" rx="3" fill="#A9DFBF"/>
  <text x="507" y="227" text-anchor="middle" font-size="9" fill="#333">查询列表</text>

  <rect x="400" y="245" width="65" height="30" rx="3" fill="#A9DFBF"/>
  <text x="432" y="264" text-anchor="middle" font-size="9" fill="#333">患者详情</text>

  <rect x="475" y="245" width="65" height="30" rx="3" fill="#A9DFBF"/>
  <text x="507" y="264" text-anchor="middle" font-size="9" fill="#333">删除患者</text>

  <line x1="470" y1="205" x2="432" y2="208" stroke="#27AE60" stroke-width="1"/>
  <line x1="470" y1="205" x2="507" y2="208" stroke="#27AE60" stroke-width="1"/>
  <line x1="432" y1="238" x2="432" y2="245" stroke="#27AE60" stroke-width="1"/>
  <line x1="507" y1="238" x2="507" y2="245" stroke="#27AE60" stroke-width="1"/>

  <!-- ===== Module 4: Trend Analysis ===== -->
  <rect x="555" y="142" width="150" height="42" rx="5" fill="#8E44AD" opacity="0.9"/>
  <text x="630" y="162" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold" font-family="SimHei">趋势分析</text>
  <text x="630" y="178" text-anchor="middle" font-size="9" fill="#e8d5f5">历史数据追踪</text>

  <line x1="630" y1="184" x2="630" y2="205" stroke="#8E44AD" stroke-width="1.2"/>

  <rect x="560" y="208" width="70" height="30" rx="3" fill="#D7BDE2"/>
  <text x="595" y="222" text-anchor="middle" font-size="9" fill="#333">诊断记录</text>
  <text x="595" y="233" text-anchor="middle" font-size="8" fill="#777">历史存储</text>

  <rect x="638" y="208" width="70" height="30" rx="3" fill="#D7BDE2"/>
  <text x="673" y="222" text-anchor="middle" font-size="9" fill="#333">ECharts</text>
  <text x="673" y="233" text-anchor="middle" font-size="8" fill="#777">折线图展示</text>

  <rect x="560" y="245" width="70" height="30" rx="3" fill="#D7BDE2"/>
  <text x="595" y="259" text-anchor="middle" font-size="9" fill="#333">趋势判断</text>
  <text x="595" y="270" text-anchor="middle" font-size="8" fill="#777">增大/减小/稳定</text>

  <rect x="638" y="245" width="70" height="30" rx="3" fill="#D7BDE2"/>
  <text x="673" y="259" text-anchor="middle" font-size="9" fill="#333">时序预测</text>
  <text x="673" y="270" text-anchor="middle" font-size="8" fill="#777">LSTM预测</text>

  <line x1="630" y1="205" x2="595" y2="208" stroke="#8E44AD" stroke-width="1"/>
  <line x1="630" y1="205" x2="673" y2="208" stroke="#8E44AD" stroke-width="1"/>
  <line x1="595" y1="238" x2="595" y2="245" stroke="#8E44AD" stroke-width="1"/>
  <line x1="673" y1="238" x2="673" y2="245" stroke="#8E44AD" stroke-width="1"/>

  <!-- ===== Module 5: LLM Advice ===== -->
  <rect x="715" y="142" width="120" height="42" rx="5" fill="#2471A3" opacity="0.9"/>
  <text x="775" y="162" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold" font-family="SimHei">LLM建议</text>
  <text x="775" y="178" text-anchor="middle" font-size="9" fill="#d6eaf8">AI辅助诊断</text>

  <line x1="775" y1="184" x2="775" y2="205" stroke="#2471A3" stroke-width="1.2"/>

  <rect x="720" y="208" width="105" height="30" rx="3" fill="#AED6F1"/>
  <text x="772" y="227" text-anchor="middle" font-size="9" fill="#333">Prompt构建</text>

  <rect x="720" y="245" width="105" height="30" rx="3" fill="#AED6F1"/>
  <text x="772" y="264" text-anchor="middle" font-size="9" fill="#333">LLM API调用</text>

  <rect x="720" y="282" width="105" height="30" rx="3" fill="#AED6F1"/>
  <text x="772" y="301" text-anchor="middle" font-size="9" fill="#333">报告存储与展示</text>

  <line x1="772" y1="238" x2="772" y2="245" stroke="#2471A3" stroke-width="1"/>
  <line x1="772" y1="275" x2="772" y2="282" stroke="#2471A3" stroke-width="1"/>

  <!-- ===== Data flow arrows ===== -->
  <!-- Segmentation -> Feature -->
  <line x1="205" y1="163" x2="225" y2="163" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>
  <text x="215" y="155" text-anchor="middle" font-size="8" fill="#888">mask</text>

  <!-- Feature -> Trend (data stored) -->
  <line x1="370" y1="163" x2="395" y2="163" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Bottom: 24 features summary -->
  <rect x="130" y="330" width="600" height="80" rx="6" fill="#F8F9FA" stroke="#DEE2E6" stroke-width="1"/>
  <text x="430" y="352" text-anchor="middle" font-size="12" fill="#555" font-weight="bold" font-family="SimHei">24项影像组学特征一览</text>
  <text x="430" y="372" text-anchor="middle" font-size="10" fill="#777">形态学 (5项): 面积、周长、重心X、重心Y、似圆度</text>
  <text x="430" y="388" text-anchor="middle" font-size="10" fill="#777">灰度统计 (4项): 均值、方差、偏度、峰态</text>
  <text x="430" y="404" text-anchor="middle" font-size="10" fill="#777">GLGCM纹理 (15项): 小梯度优势、大梯度优势、能量、相关性、灰度熵、梯度熵 等</text>

  <!-- Connection line -->
  <line x1="300" y1="275" x2="300" y2="330" stroke="#E67E22" stroke-width="1" stroke-dasharray="4,3"/>
</svg>
</body>
</html>
