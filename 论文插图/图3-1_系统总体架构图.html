<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>图3-1 系统总体架构图</title>
<style>
  body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #fff; font-family: "SimSun", "SimHei", serif; }
</style>
</head>
<body>
<svg width="860" height="640" viewBox="0 0 860 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#555"/></marker>
    <marker id="au" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto"><path d="M8,0 L0,3 L8,6 Z" fill="#555"/></marker>
  </defs>

  <text x="430" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#333" font-family="SimSun, SimHei">图3-1 系统总体架构图</text>

  <!-- ===== 用户 ===== -->
  <rect x="350" y="48" width="160" height="36" rx="18" fill="#34495E"/>
  <text x="430" y="71" text-anchor="middle" font-size="13" fill="#fff" font-family="SimHei">用户 (浏览器)</text>

  <!-- Arrow down -->
  <line x1="430" y1="84" x2="430" y2="105" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="445" y="98" font-size="9" fill="#888">HTTP</text>

  <!-- ===== Layer 1: Frontend ===== -->
  <rect x="60" y="108" width="740" height="130" rx="8" fill="#EBF5FB" stroke="#4A90D9" stroke-width="2"/>
  <text x="430" y="130" text-anchor="middle" font-size="14" font-weight="bold" fill="#2471A3" font-family="SimHei">前端展示层</text>

  <rect x="90" y="142" width="110" height="50" rx="4" fill="#4A90D9"/>
  <text x="145" y="163" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Vue 2</text>
  <text x="145" y="180" text-anchor="middle" font-size="9" fill="#ddd">单页面应用 SPA</text>

  <rect x="220" y="142" width="110" height="50" rx="4" fill="#5DADE2"/>
  <text x="275" y="163" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">ElementUI</text>
  <text x="275" y="180" text-anchor="middle" font-size="9" fill="#ddd">UI 组件库</text>

  <rect x="350" y="142" width="110" height="50" rx="4" fill="#5DADE2"/>
  <text x="405" y="163" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">ECharts</text>
  <text x="405" y="180" text-anchor="middle" font-size="9" fill="#ddd">趋势图表可视化</text>

  <rect x="480" y="142" width="110" height="50" rx="4" fill="#5DADE2"/>
  <text x="535" y="163" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Axios</text>
  <text x="535" y="180" text-anchor="middle" font-size="9" fill="#ddd">HTTP 通信</text>

  <rect x="610" y="142" width="160" height="50" rx="4" fill="#2E86C1"/>
  <text x="690" y="163" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Content.vue</text>
  <text x="690" y="180" text-anchor="middle" font-size="9" fill="#ddd">核心业务组件</text>

  <text x="140" y="218" font-size="9" fill="#2471A3">上传控件 | CT显示 | 分割结果 | 特征表格 | 趋势图 | LLM建议 | 患者管理</text>

  <!-- Arrow down -->
  <line x1="380" y1="238" x2="380" y2="268" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="480" y1="268" x2="480" y2="238" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="430" y="258" text-anchor="middle" font-size="10" fill="#E74C3C" font-weight="bold">RESTful API (JSON)</text>

  <!-- ===== Layer 2: Backend ===== -->
  <rect x="60" y="272" width="740" height="220" rx="8" fill="#FEF9E7" stroke="#F1C40F" stroke-width="2"/>
  <text x="430" y="295" text-anchor="middle" font-size="14" font-weight="bold" fill="#B7950B" font-family="SimHei">后端服务层 (Flask, Port 5003)</text>

  <!-- app.py -->
  <rect x="90" y="308" width="150" height="44" rx="4" fill="#F1C40F"/>
  <text x="165" y="328" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">app.py</text>
  <text x="165" y="344" text-anchor="middle" font-size="9" fill="#555">路由入口 + API 接口</text>

  <!-- database.py -->
  <rect x="260" y="308" width="130" height="44" rx="4" fill="#F4D03F"/>
  <text x="325" y="328" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">database.py</text>
  <text x="325" y="344" text-anchor="middle" font-size="9" fill="#555">数据库 CRUD 操作</text>

  <!-- llm_service.py -->
  <rect x="410" y="308" width="130" height="44" rx="4" fill="#F4D03F"/>
  <text x="475" y="328" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">llm_service.py</text>
  <text x="475" y="344" text-anchor="middle" font-size="9" fill="#555">LLM 辅助建议服务</text>

  <!-- Core module box -->
  <rect x="560" y="308" width="220" height="168" rx="6" fill="#FDF2E9" stroke="#E67E22" stroke-width="1.5"/>
  <text x="670" y="328" text-anchor="middle" font-size="12" fill="#E67E22" font-weight="bold" font-family="SimHei">core/ 核心推理模块</text>

  <rect x="575" y="338" width="90" height="32" rx="3" fill="#E67E22"/>
  <text x="620" y="358" text-anchor="middle" font-size="9" fill="#fff">process.py</text>
  <text x="620" y="370" text-anchor="middle" font-size="8" fill="#fdd">预处理</text>

  <rect x="675" y="338" width="90" height="32" rx="3" fill="#E67E22"/>
  <text x="720" y="358" text-anchor="middle" font-size="9" fill="#fff">predict_yolo.py</text>
  <text x="720" y="370" text-anchor="middle" font-size="8" fill="#fdd">YOLO11推理</text>

  <rect x="575" y="380" width="90" height="32" rx="3" fill="#E67E22"/>
  <text x="620" y="400" text-anchor="middle" font-size="9" fill="#fff">get_feature.py</text>
  <text x="620" y="412" text-anchor="middle" font-size="8" fill="#fdd">特征提取</text>

  <rect x="675" y="380" width="90" height="32" rx="3" fill="#E67E22"/>
  <text x="720" y="400" text-anchor="middle" font-size="9" fill="#fff">main.py</text>
  <text x="720" y="412" text-anchor="middle" font-size="8" fill="#fdd">调用入口</text>

  <!-- YOLO model -->
  <rect x="575" y="420" width="190" height="30" rx="3" fill="#D35400"/>
  <text x="670" y="440" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">YOLO11-seg 模型 (best.pt)</text>

  <!-- Time series predict -->
  <rect x="90" y="370" width="220" height="44" rx="4" fill="#F4D03F"/>
  <text x="200" y="390" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">time_series_predict.py</text>
  <text x="200" y="406" text-anchor="middle" font-size="9" fill="#555">LSTM + 线性回归 时序预测</text>

  <!-- LLM external -->
  <rect x="330" y="370" width="210" height="44" rx="4" fill="#F9E79F"/>
  <text x="435" y="388" text-anchor="middle" font-size="10" fill="#555">外部 LLM API</text>
  <text x="435" y="405" text-anchor="middle" font-size="9" fill="#888">通义千问 / DeepSeek / OpenAI</text>

  <!-- Arrow from llm_service to external -->
  <line x1="475" y1="352" x2="435" y2="370" stroke="#888" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#a)"/>

  <!-- Arrow down to storage -->
  <line x1="380" y1="492" x2="380" y2="522" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="480" y1="522" x2="480" y2="492" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="430" y="512" text-anchor="middle" font-size="10" fill="#888">读写数据</text>

  <!-- ===== Layer 3: Storage ===== -->
  <rect x="60" y="526" width="740" height="95" rx="8" fill="#F5EEF8" stroke="#8E44AD" stroke-width="2"/>
  <text x="430" y="548" text-anchor="middle" font-size="14" font-weight="bold" fill="#7D3C98" font-family="SimHei">数据存储层</text>

  <rect x="110" y="560" width="180" height="44" rx="4" fill="#8E44AD"/>
  <text x="200" y="580" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">SQLite (ctai.db)</text>
  <text x="200" y="596" text-anchor="middle" font-size="9" fill="#ddd">patients | diagnosis_records | llm_reports</text>

  <rect x="330" y="560" width="180" height="44" rx="4" fill="#AF7AC5"/>
  <text x="420" y="580" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">文件系统 (tmp/)</text>
  <text x="420" y="596" text-anchor="middle" font-size="9" fill="#ddd">image/ | mask/ | draw/ | ct/</text>

  <rect x="550" y="560" width="180" height="44" rx="4" fill="#AF7AC5"/>
  <text x="640" y="580" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">模型权重文件</text>
  <text x="640" y="596" text-anchor="middle" font-size="9" fill="#ddd">core/net/best.pt</text>
</svg>
</body>
</html>
