<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>图2-1 U-Net网络结构示意图</title>
<style>
  body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #fff; font-family: "SimSun", "SimHei", serif; }
  svg text { font-family: "SimSun", "SimHei", "Microsoft YaHei", serif; }
</style>
</head>
<body>
<svg width="920" height="620" viewBox="0 0 920 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#555"/></marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#4A90D9"/></marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#5BAF6A"/></marker>
  </defs>

  <!-- Title -->
  <text x="460" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">图2-1 U-Net网络结构示意图</text>

  <!-- ===== Encoder (Left, going down) ===== -->
  <!-- Level 1: 64 ch -->
  <rect x="60" y="60" width="120" height="50" rx="4" fill="#4A90D9" opacity="0.85"/>
  <text x="120" y="82" text-anchor="middle" font-size="11" fill="#fff">Conv 3x3 + BN + ReLU</text>
  <text x="120" y="98" text-anchor="middle" font-size="11" fill="#fff">64 channels</text>

  <!-- Down arrow 1 -->
  <rect x="90" y="120" width="60" height="24" rx="3" fill="#E8913A" opacity="0.9"/>
  <text x="120" y="137" text-anchor="middle" font-size="10" fill="#fff">MaxPool 2x2</text>
  <line x1="120" y1="110" x2="120" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Level 2: 128 ch -->
  <rect x="60" y="154" width="120" height="50" rx="4" fill="#4A90D9" opacity="0.85"/>
  <text x="120" y="176" text-anchor="middle" font-size="11" fill="#fff">Conv 3x3 + BN + ReLU</text>
  <text x="120" y="192" text-anchor="middle" font-size="11" fill="#fff">128 channels</text>
  <line x1="120" y1="144" x2="120" y2="154" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Down arrow 2 -->
  <rect x="90" y="214" width="60" height="24" rx="3" fill="#E8913A" opacity="0.9"/>
  <text x="120" y="231" text-anchor="middle" font-size="10" fill="#fff">MaxPool 2x2</text>
  <line x1="120" y1="204" x2="120" y2="214" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Level 3: 256 ch -->
  <rect x="60" y="248" width="120" height="50" rx="4" fill="#4A90D9" opacity="0.85"/>
  <text x="120" y="270" text-anchor="middle" font-size="11" fill="#fff">Conv 3x3 + BN + ReLU</text>
  <text x="120" y="286" text-anchor="middle" font-size="11" fill="#fff">256 channels</text>
  <line x1="120" y1="238" x2="120" y2="248" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Down arrow 3 -->
  <rect x="90" y="308" width="60" height="24" rx="3" fill="#E8913A" opacity="0.9"/>
  <text x="120" y="325" text-anchor="middle" font-size="10" fill="#fff">MaxPool 2x2</text>
  <line x1="120" y1="298" x2="120" y2="308" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Level 4: 512 ch -->
  <rect x="60" y="342" width="120" height="50" rx="4" fill="#4A90D9" opacity="0.85"/>
  <text x="120" y="364" text-anchor="middle" font-size="11" fill="#fff">Conv 3x3 + BN + ReLU</text>
  <text x="120" y="380" text-anchor="middle" font-size="11" fill="#fff">512 channels</text>
  <line x1="120" y1="332" x2="120" y2="342" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Down arrow 4 -->
  <rect x="90" y="402" width="60" height="24" rx="3" fill="#E8913A" opacity="0.9"/>
  <text x="120" y="419" text-anchor="middle" font-size="10" fill="#fff">MaxPool 2x2</text>
  <line x1="120" y1="392" x2="120" y2="402" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Bottleneck ===== -->
  <rect x="200" y="450" width="520" height="55" rx="6" fill="#C0392B" opacity="0.85"/>
  <text x="460" y="475" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">瓶颈层 (Bottleneck): Conv 3x3 + BN + ReLU, 1024 channels</text>
  <text x="460" y="494" text-anchor="middle" font-size="11" fill="#ffe0e0">最低空间分辨率，最高语义抽象</text>

  <!-- Encoder to bottleneck -->
  <line x1="120" y1="426" x2="120" y2="477" stroke="#555" stroke-width="1.5"/>
  <line x1="120" y1="477" x2="200" y2="477" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Bottleneck to decoder -->
  <line x1="720" y1="477" x2="800" y2="477" stroke="#555" stroke-width="1.5"/>
  <line x1="800" y1="477" x2="800" y2="402" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Decoder (Right, going up) ===== -->
  <!-- Level 4: 512 ch -->
  <rect x="740" y="342" width="120" height="50" rx="4" fill="#5BAF6A" opacity="0.85"/>
  <text x="800" y="364" text-anchor="middle" font-size="11" fill="#fff">Conv 3x3 + BN + ReLU</text>
  <text x="800" y="380" text-anchor="middle" font-size="11" fill="#fff">512 channels</text>

  <!-- Up arrow 4 -->
  <rect x="770" y="310" width="60" height="24" rx="3" fill="#8E44AD" opacity="0.85"/>
  <text x="800" y="326" text-anchor="middle" font-size="9" fill="#fff">UpConv 2x2</text>
  <line x1="800" y1="342" x2="800" y2="334" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Level 3: 256 ch -->
  <rect x="740" y="248" width="120" height="50" rx="4" fill="#5BAF6A" opacity="0.85"/>
  <text x="800" y="270" text-anchor="middle" font-size="11" fill="#fff">Conv 3x3 + BN + ReLU</text>
  <text x="800" y="286" text-anchor="middle" font-size="11" fill="#fff">256 channels</text>
  <line x1="800" y1="310" x2="800" y2="298" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Up arrow 3 -->
  <rect x="770" y="216" width="60" height="24" rx="3" fill="#8E44AD" opacity="0.85"/>
  <text x="800" y="232" text-anchor="middle" font-size="9" fill="#fff">UpConv 2x2</text>
  <line x1="800" y1="248" x2="800" y2="240" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Level 2: 128 ch -->
  <rect x="740" y="154" width="120" height="50" rx="4" fill="#5BAF6A" opacity="0.85"/>
  <text x="800" y="176" text-anchor="middle" font-size="11" fill="#fff">Conv 3x3 + BN + ReLU</text>
  <text x="800" y="192" text-anchor="middle" font-size="11" fill="#fff">128 channels</text>
  <line x1="800" y1="216" x2="800" y2="204" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Up arrow 2 -->
  <rect x="770" y="122" width="60" height="24" rx="3" fill="#8E44AD" opacity="0.85"/>
  <text x="800" y="138" text-anchor="middle" font-size="9" fill="#fff">UpConv 2x2</text>
  <line x1="800" y1="154" x2="800" y2="146" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Level 1: 64 ch -->
  <rect x="740" y="60" width="120" height="50" rx="4" fill="#5BAF6A" opacity="0.85"/>
  <text x="800" y="82" text-anchor="middle" font-size="11" fill="#fff">Conv 3x3 + BN + ReLU</text>
  <text x="800" y="98" text-anchor="middle" font-size="11" fill="#fff">64 channels</text>
  <line x1="800" y1="122" x2="800" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Skip Connections (dashed) ===== -->
  <line x1="180" y1="85" x2="740" y2="85" stroke="#999" stroke-width="1.8" stroke-dasharray="8,4" marker-end="url(#arrow)"/>
  <text x="460" y="78" text-anchor="middle" font-size="10" fill="#777">跳跃连接 (Concatenate)</text>

  <line x1="180" y1="179" x2="740" y2="179" stroke="#999" stroke-width="1.8" stroke-dasharray="8,4" marker-end="url(#arrow)"/>
  <text x="460" y="172" text-anchor="middle" font-size="10" fill="#777">跳跃连接 (Concatenate)</text>

  <line x1="180" y1="273" x2="740" y2="273" stroke="#999" stroke-width="1.8" stroke-dasharray="8,4" marker-end="url(#arrow)"/>
  <text x="460" y="266" text-anchor="middle" font-size="10" fill="#777">跳跃连接 (Concatenate)</text>

  <line x1="180" y1="367" x2="740" y2="367" stroke="#999" stroke-width="1.8" stroke-dasharray="8,4" marker-end="url(#arrow)"/>
  <text x="460" y="360" text-anchor="middle" font-size="10" fill="#777">跳跃连接 (Concatenate)</text>

  <!-- ===== Output ===== -->
  <rect x="740" y="530" width="120" height="40" rx="4" fill="#2C3E50" opacity="0.9"/>
  <text x="800" y="548" text-anchor="middle" font-size="11" fill="#fff">Conv 1x1 + Sigmoid</text>
  <text x="800" y="562" text-anchor="middle" font-size="10" fill="#ccc">输出: 1 channel</text>
  <line x1="800" y1="110" x2="800" y2="520" stroke="transparent"/>

  <!-- Output arrow -->
  <line x1="860" y1="85" x2="890" y2="85" stroke="#555" stroke-width="1.5"/>
  <line x1="890" y1="85" x2="890" y2="550" stroke="#555" stroke-width="1.5"/>
  <line x1="890" y1="550" x2="860" y2="550" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Input ===== -->
  <rect x="10" y="530" width="100" height="40" rx="4" fill="#2C3E50" opacity="0.9"/>
  <text x="60" y="548" text-anchor="middle" font-size="11" fill="#fff">输入图像</text>
  <text x="60" y="562" text-anchor="middle" font-size="10" fill="#ccc">1 x H x W</text>
  <line x1="60" y1="530" x2="60" y2="85" stroke="#555" stroke-width="1.5"/>
  <line x1="60" y1="85" x2="60" y2="70" stroke="transparent"/>

  <!-- Input arrow to encoder -->
  <line x1="10" y1="550" x2="10" y2="85" stroke="transparent"/>

  <!-- ===== Labels ===== -->
  <text x="120" y="555" text-anchor="middle" font-size="13" fill="#4A90D9" font-weight="bold">编码器</text>
  <text x="120" y="572" text-anchor="middle" font-size="11" fill="#4A90D9">(收缩路径)</text>
  <text x="800" y="585" text-anchor="middle" font-size="13" fill="#5BAF6A" font-weight="bold">解码器</text>
  <text x="800" y="602" text-anchor="middle" font-size="11" fill="#5BAF6A">(扩张路径)</text>

  <!-- Legend -->
  <rect x="320" y="540" width="16" height="12" rx="2" fill="#4A90D9" opacity="0.85"/>
  <text x="342" y="551" font-size="10" fill="#555">编码器卷积块</text>
  <rect x="420" y="540" width="16" height="12" rx="2" fill="#5BAF6A" opacity="0.85"/>
  <text x="442" y="551" font-size="10" fill="#555">解码器卷积块</text>
  <rect x="320" y="558" width="16" height="12" rx="2" fill="#E8913A" opacity="0.9"/>
  <text x="342" y="569" font-size="10" fill="#555">下采样</text>
  <rect x="420" y="558" width="16" height="12" rx="2" fill="#8E44AD" opacity="0.85"/>
  <text x="442" y="569" font-size="10" fill="#555">上采样</text>
  <line x1="320" y1="582" x2="346" y2="582" stroke="#999" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="352" y="586" font-size="10" fill="#555">跳跃连接</text>

  <!-- Size annotations on left -->
  <text x="24" y="88" text-anchor="middle" font-size="9" fill="#888">H x W</text>
  <text x="24" y="182" text-anchor="middle" font-size="9" fill="#888">H/2 x W/2</text>
  <text x="24" y="276" text-anchor="middle" font-size="9" fill="#888">H/4 x W/4</text>
  <text x="24" y="370" text-anchor="middle" font-size="9" fill="#888">H/8 x W/8</text>
  <text x="460" y="440" text-anchor="middle" font-size="9" fill="#888">H/16 x W/16</text>
</svg>
</body>
</html>
